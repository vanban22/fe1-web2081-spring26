<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-bold mb-4 text-center">Thêm truyện</h2>

    <form [formGroup]="addForm" (ngSubmit)="submitForm()" class="space-y-4">
        <div>
            <label class="block mb-1">Tên truyện</label>
            <input type="text" formControlName="title" class="w-full border p-2 rounded">
        </div>

        <div>
            <label class="block mb-1">Tác giả</label>
            <input type="text" formControlName="author" class="w-full border p-2 rounded">
        </div>

        <div>
            <label class="block mb-1">Lượt xem</label>
            <input type="number" formControlName="views" class="w-full border p-2 rounded">
        </div>

        <button class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
            Thêm
        </button>
    </form>
</div>

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-bold mb-4 text-center">bai1</h2>

    <form [formGroup]="bai1Form" (ngSubmit)="submitForm()" class="space-y-4">
        <div>
            <label class="block mb-1">name</label>
            <input type="text" formControlName="name" class="w-full border p-2 rounded">
            @if(name?.invalid ){
            <p style="color:red">bắt buộc nhập</p>
            }
        </div>
        <div>
            <label class="block mb-1">price</label>
            <input type="text" formControlName="price" class="w-full border p-2 rounded">
             @if(price?.errors?.['min']){
            <p style="color:red">phải lớn hơn 0</p>
            }

        </div>
        <div>
            <label class="block mb-1">category</label>
            <input type="number" formControlName="category" class="w-full border p-2 rounded">
        </div>

        <button class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
            Thêm
        </button>
    </form>
</div>

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-bold mb-4 text-center">bai2</h2>

    <form [formGroup]="bai2Form" (ngSubmit)="submitForm()" class="space-y-4">
        <div>
            <label class="block mb-1">username</label>
            <input type="text" formControlName="username" class="w-full border p-2 rounded">
            @if(username?.invalid){
            <p style="color:red">bắt buộc nhập</p>
            }
        </div>
        <div>
            <label class="block mb-1">email</label>
            <input type="text" formControlName="email" class="w-full border p-2 rounded">
            @if(email?.invalid ){
            <p style="color:red">bắt buộc nhập</p>
            }
        </div>
        <div>
            <label class="block mb-1">password</label>
            <input type="password" formControlName="password" class="w-full border p-2 rounded">
             @if(password?.invalid ){
            <p style="color:red">bắt buộc nhập</p>
            }
        </div>

        <button class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
            Thêm
        </button>
    </form>
</div>
